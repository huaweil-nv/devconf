# === Default shell ===
set -g default-shell /usr/bin/zsh

# === True color support ===
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# === Prefix key: C-a ===
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# === Fix WezTerm XTVERSION response leak on attach ===
set -g allow-passthrough off

# === Client health ===
# Destroy unattached sessions' dead clients; keep activity timeout short
set -g destroy-unattached off
# Detach client if it goes inactive for 600s (stale SSH/terminal)
set -g lock-after-time 0
# Quick reattach: prefix + D to pick and detach other clients
bind D choose-client -Z "detach-client -t '%%'"
# Force refresh terminal state: prefix + R (capital)
bind R refresh-client \; display "Client refreshed"

# === General settings ===
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g escape-time 10
set -g display-panes-time 1000
set -g focus-events on
set -g history-limit 50000
set -g set-clipboard on
set -g set-titles on
set -g set-titles-string '#S'
setw -g mode-keys vi
setw -g automatic-rename off
set -g allow-rename off

# === Catppuccin Mocha theme ===
# Palette:
#   base=#1e1e2e  surface0=#313244  surface1=#45475a
#   text=#cdd6f4  subtext0=#a6adc8  overlay0=#6c7086
#   blue=#89b4fa  lavender=#b4befe  mauve=#cba6f7

# Status bar
set -g status-position bottom
set -g status-interval 60
set -g status-justify centre
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa] #[fg=#a6adc8]#I:#P "
set -g status-right "#[fg=#a6adc8] %d %b %H:%M "

# Window list
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-current-format "#[bg=#45475a,fg=#cdd6f4,bold] #I:#W "
setw -g monitor-activity on
set -g visual-activity on

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# No dimming for inactive panes (keep clean)
setw -g window-style default
setw -g window-active-style default

# Message/command line
set -g message-style "fg=#cdd6f4,bg=#313244,bold"

# === Key bindings ===
# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Splitting panes
bind | split-window -h
bind - split-window -v

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window selection
bind -r C-h select-window -t :-
bind -r C-j select-window -t :+

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode (vi style)
bind x copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
unbind p
bind p paste-buffer

# Command prompt (fallback for C-a :)
bind \; command-prompt

# Send C-l through
bind C-l send-keys 'C-l'

# Log output
bind P pipe-pane -o "cat >>~/#W.log" \; display "Toggled logging to ~/#W.log"

# === Vim-tmux navigator ===
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
